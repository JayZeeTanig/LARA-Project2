name: lara_app
description: "A new Flutter project for LARA Emergency Assistance."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  google_mlkit_face_detection: ^0.11.0
  google_mlkit_text_recognition: ^0.13.0
  google_mlkit_object_detection: ^0.13.0
  google_mlkit_image_labeling: ^0.12.0
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # Ensures Material Design icons (like the visibility eye) work
  uses-material-design: true

  # ASSETS CONFIGURATION (Points to your images folder)
  assets:
    - assets/

